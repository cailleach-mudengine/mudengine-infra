name: 'OnPullRequest'

on:  
  pull_request:
    types: [opened, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  starter-ecs-pull-request:
    uses: cailleach-mudengine/mudengine-infra/.github/workflows/aws-ecs-pull-request.yml@feature/refactor
    with:
      environment: 'dev'
    secrets: inherit
